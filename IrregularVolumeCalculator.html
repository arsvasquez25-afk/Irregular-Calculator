<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irregular Volume Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --card: #1a1a24;
    --border: #2e2e42;
    --accent: #7c6dfa;
    --accent2: #f06a6a;
    --text: #eeeef5;
    --muted: #888899;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -1px;
    text-align: center;
    margin-bottom: 6px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.78rem;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(124,109,250,0.08);
  }

  label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
  }

  select, input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.92rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus { border-color: var(--accent); }

  .field { transition: opacity 0.3s; }
  .field.hidden { display: none; }

  .btn-calc {
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-calc:hover { background: #6a5ce8; }
  .btn-calc:active { transform: scale(0.98); }

  .result {
    margin-top: 20px;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 14px 18px;
    text-align: center;
    font-size: 1.1rem;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    display: none;
  }

  .formula {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-download:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-download svg { width: 15px; height: 15px; fill: currentColor; }
</style>
</head>
<body>

<h1>Irregular <span>Volume</span> Calculator</h1>
<p class="subtitle">Frustum · Pyramid · Prismatoid</p>

<div class="card">

  <label>Select Shape</label>
  <select id="cboShape" onchange="updateFields()">
    <option value="0">Frustum of a Cone</option>
    <option value="1">Frustum of a Pyramid</option>
    <option value="2">Prismatoid</option>
  </select>

  <label>Height (h)</label>
  <input type="number" id="txt1" placeholder="Enter height">

  <div class="field" id="field2">
    <label id="lbl2">Big Radius (R)</label>
    <input type="number" id="txt2" placeholder="Enter value">
  </div>

  <div class="field" id="field3">
    <label id="lbl3">Small Radius (r)</label>
    <input type="number" id="txt3" placeholder="Enter value">
  </div>

  <div class="field hidden" id="field4">
    <label>Middle Area (Am)</label>
    <input type="number" id="txt4" placeholder="Enter middle area">
  </div>

  <button class="btn-calc" onclick="calculate()">Calculate Volume</button>

  <div class="result" id="result">—</div>
  <div class="formula" id="formula"></div>

  <hr class="divider">

  <!-- Replace href below with your actual file download link -->
  <a class="btn-download" href="YOUR_DOWNLOAD_LINK_HERE" download>
    <svg viewBox="0 0 24 24"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/></svg>
    Download Windows Form (.zip)
  </a>

</div>

<script>
  const formulas = [
    "V = (1/3) × π × h × (R² + R·r + r²)",
    "V = (h/3) × (A1 + A2 + √(A1×A2))",
    "V = (h/6) × (A1 + A2 + 4×Am)"
  ];

  function updateFields() {
    const i = +document.getElementById("cboShape").value;
    document.getElementById("lbl2").textContent = i === 0 ? "Big Radius (R)" : "Base Area 1 (A1)";
    document.getElementById("lbl3").textContent = i === 0 ? "Small Radius (r)" : "Base Area 2 (A2)";
    document.getElementById("field4").classList.toggle("hidden", i !== 2);
    document.getElementById("result").style.display = "none";
    document.getElementById("formula").textContent = "";
    document.querySelectorAll("input").forEach(t => t.value = "");
  }

  function calculate() {
    const i = +document.getElementById("cboShape").value;
    const h = +document.getElementById("txt1").value;
    const x = +document.getElementById("txt2").value;
    const y = +document.getElementById("txt3").value;
    let volume = 0;

    if (i === 0) volume = (1/3) * Math.PI * h * (x**2 + x*y + y**2);
    if (i === 1) volume = (h/3) * (x + y + Math.sqrt(x * y));
    if (i === 2) { const am = +document.getElementById("txt4").value; volume = (h/6) * (x + y + 4*am); }

    const res = document.getElementById("result");
    res.style.display = "block";
    res.textContent = "Volume = " + volume.toFixed(4);
    document.getElementById("formula").textContent = formulas[i];
  }
</script>

</body>
</html>
